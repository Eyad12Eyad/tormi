<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم أوفرلي PUBG — Eyad_Eyad12</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* هذا الملف صار مستقل بالكامل — يشغّل لوحة التحكم (live-overlay-service.js) لحاله
   بدون أي حاجة لموقعك أو أي صفحة ثانية. افتحه مباشرة بأي متصفح وخلص. */
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
    background:#030612;
    min-height:100vh;
    font-family:'Rajdhani','Segoe UI',Tahoma,Arial,sans-serif;
    color:#fff;
}
#loRoot { width:100%; min-height:100vh; }
/* الحاوية الأصلية مصممة لتكون داخل مودال — هنا نخليها تاخذ الشاشة كاملة براحة */
.service-interface { padding:0; max-width:1100px; margin:0 auto; min-height:100vh; }
</style>
</head>
<body>

<div id="loRoot">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#556677;font-size:.9rem">
        <i class="fas fa-spinner fa-spin" style="margin-left:8px"></i> جاري التحميل...
    </div>
</div>

<!-- Firebase — مزامنة الحالة بين أي جهازين عبر الإنترنت (كسور الثانية). لو فشل التحميل (بدون نت مثلاً)،
     الأداة تشتغل محلياً بس (نفس الجهاز) عادي بدون أي كسر بالوظائف. -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, query, orderByChild, startAt, endAt, limitToLast, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDoB4GcBTfJjeoWXFXk-80xe1p0I9whRY0",
        authDomain: "pubg-overlay.firebaseapp.com",
        databaseURL: "https://pubg-overlay-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "pubg-overlay",
        storageBucket: "pubg-overlay.firebasestorage.app",
        messagingSenderId: "71044068816",
        appId: "1:71044068816:web:e0cfcb64bfa51e58c475d5"
    };

    try{
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);
        window.loFirebase = { db, ref, set, onValue, push, query, orderByChild, startAt, endAt, limitToLast, onChildAdded, remove, storage, sRef, uploadBytes, getDownloadURL, serverTimeOffset: 0 };

        /* فرق الساعة بين هذا الجهاز وسيرفرات فايربيس — نستخدمه لاحقاً بكل مكان نحسب فيه Date.now()
           حتى ما تنفرد ساعة هذا الجهاز بتحديد "وقت" الحدث. ننتظره قبل لا نعلن الجاهزية. */
        await new Promise(resolve=>{
            onValue(ref(db,'.info/serverTimeOffset'), snap=>{
                window.loFirebase.serverTimeOffset = snap.val() || 0;
                resolve();
            }, { onlyOnce:true });
        });
    }catch(e){
        console.warn('[Firebase] تعذر التهيئة — الأداة تشتغل محلياً بس بدون مزامنة بين الأجهزة:', e);
    }
    window.dispatchEvent(new Event('lo-firebase-ready'));
</script>

<!-- الملف الأساسي بكل منطق اللوحة — لازم يكون بنفس المجلد -->
<script src="live-overlay-service.js"></script>
<script>
    /* live-overlay-service.js مصمم أصلاً ليندمج بموقع فيه نظام مودالات (openService)،
       هنا نتجاوز هذا كلياً ونبني الواجهة مباشرة بالصفحة نفسها بدون أي حاجة خارجية */
    document.getElementById('loRoot').innerHTML = loHTML();
    requestAnimationFrame(loInit);
</script>

</body>
</html>
