<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PUBG Kill Card — Eyad_Eyad12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ملف مستقل بالكامل — ما له أي علاقة بجدول الفرق (live-overlay.html).
   يُضاف كمصدر Browser Source منفصل بـ OBS، شفاف بالكامل، ولا يعرض أي شيء
   إلى أن تصير قتلة (تفنيش) فتظهر كارد القتلة لحاله فوق أي مشهد. */
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:transparent; font-family:'Rajdhani','Segoe UI',Arial,sans-serif; width:100%; height:100%; overflow:hidden; }

/* ════ كارد قتلة مفردة — بستايل شاشة اللعبة الأصلية (شعار + اسم + ضرر + مسافة + إسقاطات) ════ */
.kill-card{
    position:fixed;
    bottom:26px; left:26px;
    display:flex; align-items:stretch;
    background:rgba(8,10,16,.92);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 14px 40px rgba(0,0,0,.7);
    z-index:99998;
    opacity:0; transform:translateY(16px);
    pointer-events:none;
    transition:opacity .35s ease, transform .35s cubic-bezier(.22,1.3,.36,1);
}
.kill-card.show{ opacity:1; transform:translateY(0); }

/* طبقة الخلفية (صورة/فيديو) — عقدة ثابتة لا تُعاد أبداً، تبقى خلف كل المحتوى */
.kc-bg-layer{ position:absolute; inset:0; z-index:0; overflow:hidden; }
.kc-bg-layer img, .kc-bg-layer video{ width:100%; height:100%; object-fit:cover; }
.kc-bg-layer::after{ content:''; position:absolute; inset:0; background:linear-gradient(90deg, rgba(4,6,10,.55), rgba(4,6,10,.75)); }
.kc-content{ position:relative; z-index:1; display:flex; align-items:stretch; }

.kc-logo-wrap{
    position:relative; width:56px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.35);
}
.kc-logo-img{ width:38px; height:38px; border-radius:8px; object-fit:cover; }
.kc-logo-fallback{ font-family:'Teko',sans-serif; font-weight:700; font-size:1.4rem; }
.kc-flag{ position:absolute; bottom:3px; right:3px; width:16px; height:12px; object-fit:cover; border-radius:2px; box-shadow:0 0 0 1px rgba(255,255,255,.4); }

.kc-team-block{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.kc-team-block .kc-logo-wrap{ border-right:none; border-bottom:3px solid; width:64px; }
.kc-abbr{ font-family:'Teko',sans-serif; font-weight:700; font-size:.95rem; color:#fff; letter-spacing:.04em; padding:2px 8px; background:rgba(0,0,0,.35); width:100%; text-align:center; }

.kc-action{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6px 16px; min-width:80px;
    background:linear-gradient(180deg, rgba(120,20,20,.55), rgba(60,8,8,.55));
    border-right:1px solid rgba(255,255,255,.08); border-left:1px solid rgba(255,255,255,.08);
}
.kc-action-word{ font-family:'Teko',sans-serif; font-weight:700; font-size:1.15rem; letter-spacing:.08em; color:#ff5555; text-transform:uppercase; }
.kc-action-knock .kc-action-word{ color:#ffcf4d; }
.kc-action-count{ font-family:'Teko',sans-serif; font-weight:700; font-size:1.4rem; color:#fff; line-height:1; }

.kc-player{ color:#9aa8bb; font-size:.7rem; font-weight:600; letter-spacing:.03em; padding:6px 14px; }
</style>
</head>

    try{
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.loFirebase = { db, ref, onValue, query, orderByChild, startAt, onChildAdded, serverTimeOffset: 0 };
        await new Promise(resolve=>{
            onValue(ref(db,'.info/serverTimeOffset'), snap=>{
                window.loFirebase.serverTimeOffset = snap.val() || 0;
                resolve();
            }, { onlyOnce:true });
        });

        console.warn('[Firebase] تعذر التهيئة — الملف يشتغل محلياً بس:', e);
    }
    window.dispatchEvent(new Event('lo-firebase-ready'));
</script>

/* ════ IndexedDB — قراءة خلفية الكارد المخزّنة من لوحة التحكم ════ */
const LO_DB_NAME='lo_media_store', LO_DB_STORE='media';
function loIdbOpen(){
    return new Promise((resolve,reject)=>{
        const req=indexedDB.open(LO_DB_NAME,1);
        req.onupgradeneeded=()=>{ if(!req.result.objectStoreNames.contains(LO_DB_STORE)) req.result.createObjectStore(LO_DB_STORE); };
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>reject(req.error);
    });
}
async function loIdbGet(key){
    const db=await loIdbOpen();
    return new Promise((resolve,reject)=>{
        const tx=db.transaction(LO_DB_STORE,'readonly');
        const req=tx.objectStore(LO_DB_STORE).get(key);
        req.onsuccess=()=>resolve(req.result||null);
        req.onerror=()=>reject(req.error);
    });
}

try{ bc = new BroadcastChannel(CH); }catch(_){}
if(bc){
    bc.onmessage = e => {
        if (e.data?.type === 'UPDATE') { currentSettings = e.data.settings || {}; applyKcBg(); }
        if (e.data?.type === 'PLAYER_KILLED') showKillCard(e.data.team, e.data.player, e.data.damage, e.data.distance, e.data.airdrops, e.data.killer, e.data.mode, e.data.count);
    };
}

/* ── Firebase (جهاز ثاني — عبر الإنترنت) ── */
const LO_FB_ROOM='default';
function loSetupFirebaseListeners(){
    if(!window.loFirebase) return;
    const {db,ref,onValue,query,orderByChild,startAt,onChildAdded,serverTimeOffset} = window.loFirebase;
    const _fbPageLoadTs = Date.now() + (serverTimeOffset||0);
    try{
        onValue(ref(db,`rooms/${LO_FB_ROOM}/state`), snap=>{
            const val=snap.val(); if(!val) return;
            currentSettings = val.settings||{};
            applyKcBg();
        });
        const evQuery = query(ref(db,`rooms/${LO_FB_ROOM}/events`), orderByChild('ts'), startAt(_fbPageLoadTs));
        onChildAdded(evQuery, snap=>{
            const ev=snap.val(); if(!ev) return;
            if(ev.type==='PLAYER_KILLED') showKillCard(ev.team, ev.player, ev.damage, ev.distance, ev.airdrops, ev.killer, ev.mode, ev.count);
        });
    }catch(e){ console.warn('[Firebase] فشل ربط المستمعين:', e); }
}
if(window.loFirebase) loSetupFirebaseListeners();
else window.addEventListener('lo-firebase-ready', loSetupFirebaseListeners);

/* تحميل أولي: نحاول جيب خلفية مخصصة محفوظة، وإلا نستخدم الافتراضية (شعار الأورگ) */
(async()=>{
    try{
        currentSettings = JSON.parse(localStorage.getItem('lo_overlay_settings')||'{}');
        const saved = await loIdbGet('killCardBg');
        if(saved){
            if(!currentSettings.bg) currentSettings.bg={};
            currentSettings.bg.killCardBg = saved;
        }
    }catch(_){}
    applyKcBg();
})();

function applyKcBg(){
    const bg = currentSettings?.bg?.killCardBg;
    const card = document.getElementById('killCard');
    if(!card) return; /* بينطبق تلقائياً أول ما يتبنى الكارد بأول قتلة */
    setKcBgLayer(card, bg);
}

function setKcBgLayer(container, bgData){
    let layer = container.querySelector('.kc-bg-layer');
    const useDefault = !bgData;
    const finalBg = bgData || {type:'image', data:DEFAULT_KC_BG};
    if(!layer){
        layer = document.createElement('div');
        layer.className = 'kc-bg-layer';
        container.insertBefore(layer, container.firstChild);
    }
    layer.innerHTML = finalBg.type==='video'
        ? `<video src="${finalBg.data}" muted autoplay loop playsinline></video>`
        : `<img src="${finalBg.data}">`;
}

/* ════════════════════════════════════════════════
   كارد قتلة مفردة — بنفس ستايل شاشة اللعبة الأصلية
   (شعار الفريق + اسم الفريق + اسم اللاعب + الضرر + المسافة + الإسقاطات)
   يطلع لكل "قتل/تفنيش" لحاله، مو بس لما يخلص الفريق كامل
════════════════════════════════════════════════ */
let _killCardQueue = [];
let _killCardShowing = false;

function showKillCard(team, player, damage, distance, airdrops, killer, mode, count){
    _killCardQueue.push({team, player, damage, distance, airdrops, killer, mode:mode||'kill', count:count||1});
    if(!_killCardShowing) processKillCardQueue();
}

function processKillCardQueue(){
    const ev = _killCardQueue.shift();
    if(!ev){ _killCardShowing=false; return; }
    _killCardShowing = true;

    try{
        let card = document.getElementById('killCard');
        if(!card){
            card = document.createElement('div');
            card.id = 'killCard';
            card.className = 'kill-card';
            const content = document.createElement('div');
            content.className = 'kc-content';
            card.appendChild(content);
            document.body.appendChild(card);
        }
        /* الخلفية تُطبَّق/تُحدَّث دون لمس المحتوى — تبقى ثابتة (يشتغل الفيديو بسلاسة) */
        setKcBgLayer(card, currentSettings?.bg?.killCardBg);

        function kcTeamBlock(team){
            if(!team) return '';
            const logoHtml = team.logo
                ? `<img class="kc-logo-img" src="${team.logo}">`
                : `<div class="kc-logo-fallback" style="color:${team.color||'#fff'}">${(team.abbr||team.name||'?').slice(0,2).toUpperCase()}</div>`;
            const hasFlag = team.flag && team.flag!=='none';
            const flagHtml = hasFlag ? `<img class="kc-flag" src="https://flagcdn.com/w40/${team.flag}.png" alt="">` : '';
            return `<div class="kc-team-block">
                <div class="kc-logo-wrap" style="border-color:${team.color||'rgba(255,255,255,.2)'}">${logoHtml}${flagHtml}</div>
                <div class="kc-abbr">${(team.abbr||team.name||'').toUpperCase()}</div>
            </div>`;
        }

        const t = ev.team;
        const content = card.querySelector('.kc-content');
        const actionWord = ev.mode==='knock' ? 'KNOCK' : 'KILL';
        const actionClass = ev.mode==='knock' ? 'kc-action-knock' : '';

        if(ev.killer){
            /* المربع الأول = الفريق القاتل، بالنص "KILL/KNOCK" وعدد، ثم الفريق المقتول منه */
            content.innerHTML = `
                ${kcTeamBlock(ev.killer)}
                <div class="kc-action ${actionClass}">
                    <div class="kc-action-word">${actionWord}</div>
                    <div class="kc-action-count">x${ev.count||1}</div>
                </div>
                ${kcTeamBlock(t)}`;
        } else {
            /* ما عندنا فريق قاتل معروف (كشف تلقائي) — نعرض فريق الضحية بس */
            content.innerHTML = `
                ${kcTeamBlock(t)}
                <div class="kc-action ${actionClass}">
                    <div class="kc-action-word">${actionWord}</div>
                </div>
                ${ev.player ? `<div class="kc-player">${ev.player}</div>` : ''}`;
        }

        requestAnimationFrame(()=> card.classList.add('show'));
        setTimeout(()=>{
            card.classList.remove('show');
            setTimeout(processKillCardQueue, 350);
        }, 4000);
    }catch(e){
        console.error('[killCard] خطأ:', e);
        _killCardShowing = false;
        processKillCardQueue();
    }
}
</script>
