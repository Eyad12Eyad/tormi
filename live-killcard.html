<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PUBG Kill Card — Eyad_Eyad12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ملف مستقل بالكامل — ما له أي علاقة بجدول الفرق (live-overlay.html).
   يُضاف كمصدر Browser Source منفصل بـ OBS، شفاف بالكامل، ولا يعرض أي شيء
   إلى أن تصير قتلة (تفنيش) فتظهر كارد القتلة لحاله فوق أي مشهد. */
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:transparent; font-family:'Rajdhani','Segoe UI',Arial,sans-serif; width:100%; height:100%; overflow:hidden; }

/* ════ كارد قتلة مفردة — بستايل شاشة اللعبة الأصلية (شعار + اسم + ضرر + مسافة) ════ */
.kill-card{
    position:fixed;
    bottom:26px; left:26px;
    display:flex; align-items:stretch;
    background:rgba(8,10,16,.92);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 14px 40px rgba(0,0,0,.7);
    z-index:99998;
    opacity:0; transform:translateY(16px);
    pointer-events:none;
    transition:opacity .35s ease, transform .35s cubic-bezier(.22,1.3,.36,1);
}
.kill-card.show{ opacity:1; transform:translateY(0); }
.kc-logo-wrap{
    position:relative; width:56px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.35);
    border-right:3px solid;
}
.kc-logo-img{ width:38px; height:38px; border-radius:8px; object-fit:cover; }
.kc-logo-fallback{ font-family:'Teko',sans-serif; font-weight:700; font-size:1.4rem; }
.kc-flag{ position:absolute; bottom:3px; right:3px; width:16px; height:12px; object-fit:cover; border-radius:2px; box-shadow:0 0 0 1px rgba(255,255,255,.4); }
.kc-info{
    display:flex; flex-direction:column; justify-content:center; gap:2px;
    padding:8px 14px; min-width:130px;
    background:linear-gradient(90deg, rgba(20,26,40,.9), rgba(10,13,20,.85));
}
.kc-team{ color:#fff; font-weight:800; font-size:.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px; }
.kc-player{ color:#9aa8bb; font-size:.7rem; font-weight:600; letter-spacing:.03em; }
.kc-stats{ display:flex; }
.kc-stat{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6px 16px;
    background:rgba(120,20,20,.55);
    border-right:1px solid rgba(255,255,255,.08);
    min-width:80px;
}
.kc-stat:last-child{ border-right:none; }
.kc-stat-label{ font-size:.55rem; color:rgba(255,255,255,.65); letter-spacing:.06em; font-weight:700; margin-bottom:2px; }
.kc-stat-val{ font-family:'Teko',sans-serif; font-weight:700; font-size:1.3rem; color:#fff; line-height:1; }
</style>
</head>
<body>

<script>
/* نفس مفاتيح القناة المستخدمة بباقي الملفات — حتى يوصلها بث القتلات من لوحة التحكم */
const CH = 'pubg-live-eyad12';
let bc;
try{ bc = new BroadcastChannel(CH); }catch(_){}
if(bc){
    bc.onmessage = e => {
        if (e.data?.type === 'PLAYER_KILLED') showKillCard(e.data.team, e.data.player, e.data.damage, e.data.distance);
    };
}

/* ════════════════════════════════════════════════
   كارد قتلة مفردة — بنفس ستايل شاشة اللعبة الأصلية
   (شعار الفريق + اسم الفريق + اسم اللاعب + الضرر + المسافة)
   يطلع لكل "قتل/تفنيش" لحاله، مو بس لما يخلص الفريق كامل
════════════════════════════════════════════════ */
let _killCardQueue = [];
let _killCardShowing = false;

function showKillCard(team, player, damage, distance){
    _killCardQueue.push({team, player, damage, distance});
    if(!_killCardShowing) processKillCardQueue();
}

function processKillCardQueue(){
    const ev = _killCardQueue.shift();
    if(!ev){ _killCardShowing=false; return; }
    _killCardShowing = true;

    try{
        let card = document.getElementById('killCard');
        if(!card){
            card = document.createElement('div');
            card.id = 'killCard';
            card.className = 'kill-card';
            document.body.appendChild(card);
        }

        const t = ev.team;
        const logoHtml = t.logo
            ? `<img class="kc-logo-img" src="${t.logo}">`
            : `<div class="kc-logo-fallback" style="color:${t.color||'#fff'}">${(t.abbr||t.name||'?').slice(0,2).toUpperCase()}</div>`;
        const hasFlag = t.flag && t.flag!=='none';
        const flagHtml = hasFlag ? `<img class="kc-flag" src="https://flagcdn.com/w40/${t.flag}.png" alt="">` : '';

        card.innerHTML = `
            <div class="kc-logo-wrap" style="border-color:${t.color||'rgba(255,255,255,.2)'}">${logoHtml}${flagHtml}</div>
            <div class="kc-info">
                <div class="kc-team">${t.name}</div>
                ${ev.player ? `<div class="kc-player">${ev.player}</div>` : ''}
            </div>
            <div class="kc-stats">
                <div class="kc-stat">
                    <div class="kc-stat-label">DAMAGE DEALT</div>
                    <div class="kc-stat-val">${ev.damage!=null ? String(ev.damage).padStart(4,'0') : '----'}</div>
                </div>
                <div class="kc-stat">
                    <div class="kc-stat-label">DISTANCE</div>
                    <div class="kc-stat-val">${ev.distance!=null ? ev.distance+'M' : '----'}</div>
                </div>
            </div>`;

        requestAnimationFrame(()=> card.classList.add('show'));
        setTimeout(()=>{
            card.classList.remove('show');
            setTimeout(processKillCardQueue, 350);
        }, 4000);
    }catch(e){
        console.error('[killCard] خطأ:', e);
        _killCardShowing = false;
        processKillCardQueue();
    }
}
</script>

</body>
</html>
