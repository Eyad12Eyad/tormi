<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getDatabase, ref, onValue, query, orderByChild, startAt, onChildAdded } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDoB4GcBTfJjeoWXFXk-80xe1p0I9whRY0",
        authDomain: "pubg-overlay.firebaseapp.com",
        databaseURL: "https://pubg-overlay-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "pubg-overlay",
        storageBucket: "pubg-overlay.firebasestorage.app",
        messagingSenderId: "71044068816",
        appId: "1:71044068816:web:e0cfcb64bfa51e58c475d5"
    };

    try{
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.loFirebase = { db, ref, onValue, query, orderByChild, startAt, onChildAdded, serverTimeOffset: 0 };

        /* فرق الساعة بين هذا الجهاز وسيرفرات فايربيس — لازم نعرفه قبل لا نحسب "وقت فتح الصفحة"
           حتى ما ينرفض حدث إقصاء وصل فعلاً بعد الفتح بس ساعة الجهاز الثاني كانت متأخرة عنا. */
        await new Promise(resolve=>{

<script>
const KEY = 'pubg_live_eyad12';
const CH  = 'pubg-live-eyad12';
let nameToggle = {};
let prevData   = null;
let currentSettings = {};
let bc;

/* حماية من البيانات القديمة: نسجل وقت آخر تحديث "معتمد" (من فايربيس أو BroadcastChannel)،
   وأي بيانات جاية من localStorage المحلي أقدم من هذا الوقت تُتجاهل تماماً.
   هذا يمنع localStorage القديم/العالق بجهاز الأوفرلي من إنه يكتب فوق تحديث حقيقي وصل تواً. */
let lastGoodTs = 0;
let lastTeams  = [];

/* ════ IndexedDB — قراءة الخلفيات (صور/فيديو) المخزّنة من لوحة التحكم ════
   نفس القاعدة/المخزن المستخدمين بملف الخدمة، حتى تُقرأ نفس الملفات هنا */
const LO_DB_NAME='lo_media_store', LO_DB_STORE='media';
function loIdbOpen(){
    return new Promise((resolve,reject)=>{
        const req=indexedDB.open(LO_DB_NAME,1);
        req.onupgradeneeded=()=>{ if(!req.result.objectStoreNames.contains(LO_DB_STORE)) req.result.createObjectStore(LO_DB_STORE); };
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>reject(req.error);
    });
}
async function loIdbGet(key){
    const db=await loIdbOpen();
    return new Promise((resolve,reject)=>{
        const tx=db.transaction(LO_DB_STORE,'readonly');
        const req=tx.objectStore(LO_DB_STORE).get(key);
        req.onsuccess=()=>resolve(req.result||null);
        req.onerror=()=>reject(req.error);
    });
}

/* ── BroadcastChannel (نفس الجهاز — فوري ومجاني) ── */
try {
    bc = new BroadcastChannel(CH);
    bc.onmessage = e => {
        if (e.data?.type === 'UPDATE') {
            lastGoodTs = Date.now(); /* أحدث مصدر دائماً — يفوز على أي شي محلي أقدم */
            lastTeams  = e.data.teams || [];
            currentSettings=e.data.settings||{}; applySettings(); render(lastTeams);
        }
        if (e.data?.type === 'TEAM_ELIMINATED') showElimBanner(e.data.team);
    };
} catch(_) {}

/* ── Firebase (جهاز ثاني — عبر الإنترنت) ── */
const LO_FB_ROOM='default';
function loSetupFirebaseListeners(){
    if(!window.loFirebase) return;
    const {db,ref,onValue,query,orderByChild,startAt,onChildAdded,serverTimeOffset} = window.loFirebase;
    /* نحسبها هنا (بعد ما نعرف serverTimeOffset) لا بلحظة تحميل السكربت، حتى تكون مقارنة
       بنفس "ساعة" فايربيس اللي رح تُقاس فيها أوقات الأحداث القادمة (ts) */
    const _fbPageLoadTs = Date.now() + (serverTimeOffset||0);
    try{
        onValue(ref(db,`rooms/${LO_FB_ROOM}/state`), snap=>{
            const val=snap.val(); if(!val) return;
            const ts = val.updatedAt || Date.now();
            if(ts < lastGoodTs) return; /* تجاهل أي حالة أقدم من آخر تحديث معتمد وصلنا */
            lastGoodTs = ts;
            lastTeams  = val.teams||[];
            currentSettings = val.settings||{};
            applySettings();
            render(lastTeams);
        });
        const evQuery = query(ref(db,`rooms/${LO_FB_ROOM}/events`), orderByChild('ts'), startAt(_fbPageLoadTs));
        onChildAdded(evQuery, snap=>{
            const ev=snap.val(); if(!ev) return;
            if(ev.type==='TEAM_ELIMINATED') showElimBanner(ev.team);
        });
    }catch(e){ console.warn('[Firebase] فشل ربط المستمعين:', e); }
}
if(window.loFirebase) loSetupFirebaseListeners();
else window.addEventListener('lo-firebase-ready', loSetupFirebaseListeners);

let _elimShowing = false;

function showElimBanner(team){
    _elimQueue.push(team);
    if(!_elimShowing) processElimQueue();
}

async function processElimQueue(){
    const team = _elimQueue.shift();
    if(!team){ _elimShowing=false; return; }
    _elimShowing=true;

    try{
        let banner = document.getElementById('elimBanner');
        if(!banner){
            banner = document.createElement('div');
            banner.id = 'elimBanner';
            banner.className = 'elim-banner';
            /* حاوية محتوى ثابتة الاسم — تُحدَّث لوحدها فتبقى طبقة الخلفية (sb-bg-layer) سليمة
               ولا تُعاد أبداً، فيشتغل فيديو خلفية البانر بسلاسة بين كل إشعار وآخر */
            const content = document.createElement('div');
            content.className = 'elim-banner-content';
            banner.appendChild(content);
            document.body.appendChild(banner);
        }

        /* خلفية البانر: أولوية لخلفية خاصة بهذا الفريق تحديداً (إن وُجدت)، وإلا الخلفية العامة */
        let teamBg = currentSettings?.teamElimBg?.[team.id];
        if(teamBg===undefined){
            try{ teamBg = await loIdbGet('elimBg_team_'+team.id); }catch(_){ teamBg=null; }
        }
        setBgLayer(banner, teamBg || currentSettings?.bg?.elimBannerBg);
        applyElimBannerSettings(currentSettings.elimBanner);

        const content = banner.querySelector('.elim-banner-content');
        const logoHtml = team.logo
            ? `<img src="${team.logo}">`
            : `<span class="flag-fallback">${team.flag||'🏳️'}</span>`;

        content.innerHTML = `
            <div class="elim-banner-top"><span>تم الإقصاء${team.reason ? ' ل'+team.reason : ''}</span></div>
            <div class="elim-banner-body">
                <div class="elim-logo-wrap" style="border-color:${team.color||'rgba(255,255,255,.15)'}">${logoHtml}</div>
                <div class="elim-info">
                    <div class="elim-team-name">${team.name}</div>
                    <div class="elim-team-abbr">${team.abbr||''}</div>
                    <div class="elim-stats">
                        <div class="elim-stat"><b>${team.kills||0}</b><span>Kills</span></div>
                    </div>
                </div>
                <div class="elim-place-badge">
                    <b>#${team.place||'-'}</b>
                    <span>Place</span>
                </div>
            </div>`;

        requestAnimationFrame(()=> banner.classList.add('show'));

        setTimeout(()=>{
            banner.classList.remove('show');
            setTimeout(processElimQueue, 450); /* بعد الاختفاء بالكامل، اعرض التالي بالطابور إن وُجد */
        }, 4500);
    }catch(e){
        /* أي خطأ غير متوقع لا يجب أن يوقف كل الإشعارات القادمة نهائياً */
        console.error('[elimBanner] خطأ أثناء عرض إشعار الإقصاء:', e);
        _elimShowing = false;
        processElimQueue();
    }
}

/* ── Name toggle every 2 s ──
   نستخدم lastTeams (آخر بيانات معتمدة فعلياً من فايربيس/BroadcastChannel) بدل قراءة
   localStorage من جديد، حتى ما نرجع نعرض بيانات محلية قديمة/عالقة بجهاز الأوفرلي */
setInterval(() => {
    if (!lastTeams.length) return;
    lastTeams.forEach(t => { nameToggle[t.id] = !nameToggle[t.id]; });
    render(lastTeams);
}, 2000);

/* ── Poll localStorage (فقط كخط دفاع أخير لنفس الجهاز، ولو ماكو تحديث أحدث وصل أصلاً) ── */
setInterval(() => {
    const data = load();
    const ts = data?.updated || 0;
    if (ts < lastGoodTs) return; /* تجاهل بيانات localStorage الأقدم من آخر تحديث معتمد */
    const sig  = JSON.stringify(data);
    if (sig !== prevData) {
        prevData = sig;
        if (data?.teams?.length) { lastGoodTs = ts || Date.now(); lastTeams = data.teams; render(lastTeams); }
    }
}, 400);

function load() {
    try { return JSON.parse(localStorage.getItem(KEY)); } catch(_) { return null; }
}

function totalPts(t) { return (t.kills || 0) + (t.placementPts || 0); }

/* تطبيق إعدادات الخلفية وإخفاء الأعمدة وعنوان البطولة */
function applySettings(){
    const cv = currentSettings.colVis || {};
    const bg = currentSettings.bg || {};

    if(currentSettings.title){
        const t=document.getElementById('sbTitle');
        if(t) t.textContent=currentSettings.title.toUpperCase();
    }

    /* أعمدة PTS/ELIMS */
    document.getElementById('hdrPts').style.display   = cv.total===0 ? 'none':'';
    document.getElementById('hdrElims').style.display = cv.kills===0 ? 'none':'';
    let cols = ['42px','1fr','74px'];
    cols.push(cv.total===0?'0px':'52px');
    cols.push(cv.kills===0?'0px':'56px');
    document.documentElement.style.setProperty('--grid-cols', cols.join(' '));

    /* خلفية الشريط العلوي (الهيدر) والشريط الثاني (الجدول)
       عقدة ثابتة — لا تُلمس أبداً أثناء إعادة رسم الصفوف، فيشتغل الفيديو بسلاسة */
    setBgLayer('sb-hdr', bg.headerBg);
    setBgLayer('sb-body', bg.bodyBg);

    /* مكان وحجم بانر إشعار الإقصاء */
    applyElimBannerSettings(currentSettings.elimBanner);
}

/* مكان بانر الإقصاء أصبح حر بالكامل (نقطة x%,y% محفوظة من لوحة التحكم عبر السحب) */
function applyElimBannerSettings(cfg){
    const root = document.documentElement.style;
    root.setProperty('--eb-x', (cfg?.xPct ?? 50) + '%');
    root.setProperty('--eb-y', (cfg?.yPct ?? 50) + '%');
    root.setProperty('--eb-scale', cfg?.scale || 1);
}

function setBgLayer(container, bgData){
    if(typeof container === 'string') container=document.getElementById(container);
    if(!container) return;
    let layer=container.querySelector('.sb-bg-layer');

    if(!bgData){
        if(layer) layer.remove();
        return;
    }

    /* إنشاء العقدة مرة وحدة فقط، ولا نلمسها بعدها إطلاقاً إلا لو تغيّر المصدر فعلياً */
    if(!layer){
        layer=document.createElement('div');
        layer.className='sb-bg-layer';
        container.insertBefore(layer, container.firstChild);
    }
    if(layer.dataset.src===bgData.data) return; /* نفس الملف — لا تعيد الإنشاء */
    layer.dataset.src=bgData.data;

    if(bgData.type==='video'){
        const v=document.createElement('video');
        v.src=bgData.data; v.muted=true; v.autoplay=true; v.loop=true; v.playsInline=true;
        layer.innerHTML=''; layer.appendChild(v);
        v.play().catch(()=>{});
    } else {
        const img=document.createElement('img');
        img.src=bgData.data;
        layer.innerHTML=''; layer.appendChild(img);
    }
}

function render(teams) {
    /* نستهدف عقدة الصفوف فقط — طبقة الخلفية (بما فيها الفيديو) تبقى ثابتة تماماً ولا تُعاد أبداً */
    const rowsEl = document.getElementById('sb-rows');
    if (!teams?.length) { rowsEl.innerHTML = '<div class="sb-empty">لا توجد فرق</div>'; return; }

    const sorted = [...teams].sort((a, b) => totalPts(b) - totalPts(a));

    rowsEl.innerHTML = sorted.map((t, i) => {
        const pts      = totalPts(t);
        const players  = (t.players||[]).map(p=> typeof p==='string' ? {name:'',status:p} : p);
        const allAlive = players.every(p => p.status === 'alive');
        const allElim  = players.every(p => p.status === 'eliminated');
        const name     = nameToggle[t.id] ? (t.abbr || t.name.slice(0,4).toUpperCase()) : t.name;
        const bars     = players.map(p => `<div class="pbar ${p.status}" title="${p.name||''}"></div>`).join('');
        /* العلم يُعرض كصورة حقيقية (flagcdn) لا كإيموجي — إيموجي الأعلام المركّبة تنكسر على ويندوز/OBS (CEF)
           وتطلع كنص حروف الدولة بدل الصورة الملونة. t.flag يخزّن كود الدولة (مثل 'iq'، 'sa') أو 'none' */
        const hasFlag = t.flag && t.flag!=='none';
        const flagBadge = hasFlag ? `<img class="t-flag-badge" src="https://flagcdn.com/w40/${t.flag}.png" alt="">` : '';
        const logoOrFlag = t.logo
            ? `<span class="t-logo-wrap"><img class="t-logo" src="${t.logo}">${flagBadge}</span>`
            : (hasFlag
                ? `<span class="t-logo-wrap"><img class="t-flag-solo" src="https://flagcdn.com/w40/${t.flag}.png" alt=""></span>`
                : `<span class="t-logo-wrap"><span class="t-flag">🏳️</span></span>`);

        return `
        <div class="t-row ${allAlive ? 'all-alive' : ''} ${allElim ? 'elim-row' : ''}" data-id="${t.id}" style="--tc:${t.color||'#888'}">
            <div class="t-rank-wrap"><div class="t-rank">${i + 1}</div></div>
            <div class="t-info">
                ${logoOrFlag}
                <div class="t-color-dot" style="background:${t.color || '#aaa'};color:${t.color || '#aaa'}"></div>
                <div class="t-name" style="color:${allAlive ? '#fff' : (allElim ? '#666' : '#e2e2e2')}">${name}</div>
            </div>
            <div class="p-bars">${bars}</div>
            <div class="t-pts">${pts}</div>
            <div class="t-elims">${t.kills || 0}</div>
        </div>`;
    }).join('');

    checkSpotlightTrigger(teams);
}

/* ════════════════════════════════════════════════
   عرض الفرق المتبقية الدوّار — التصميم الفعلي انتقل لملف مستقل
   (live-spotlight.html) يُضاف كمصدر منفصل شفاف بالكامل بـ OBS.
   هنا فقط نُزامن اختفاء/ظهور جدول الفرق بنفس توقيت ذاك الملف بالضبط،
   بالاعتماد على نفس بيانات الفرق ونفس شروط التفعيل، حتى ما يتعارضون.
════════════════════════════════════════════════ */
let _spotlightActive = false;
let _spotlightSeen = false;
let _spotlightLastCount = null;

function getRemainingTeams(teams){
    return teams.filter(t=>{
        const players = (t.players||[]).map(p=> typeof p==='string' ? {status:p} : p);
        return !players.every(p=>p.status==='eliminated');
    });
}

function checkSpotlightTrigger(teams){
    const cfg = currentSettings?.spotlight || {};
    if(cfg.enabled===false) return; /* مُعطّل من الإعدادات */
    const triggerCount = cfg.triggerCount || 5;
    const cycles = Math.max(1, cfg.cycles || 3);
    const showMs = cfg.cardMs || 4500;
    const gapMs  = cfg.gapMs  || 700;

    const remaining = getRemainingTeams(teams);
    const count = remaining.length;

    /* إعادة ضبط عند بدء جولة/ماتش جديد (العدد ارتفع فوق حد التفعيل مرة أخرى) */
    if(_spotlightLastCount!==null && count>_spotlightLastCount && count>triggerCount){
        _spotlightSeen=false;
    }
    _spotlightLastCount = count;

    if(count>0 && count<=triggerCount && !_spotlightSeen && !_spotlightActive){
        _spotlightSeen = true;
        runRowsHideSequence(cycles, showMs, gapMs);
    }
}

function runRowsHideSequence(cycles, showMs, gapMs){
    _spotlightActive = true;
    const rows = document.getElementById('sb-rows');
    let cycle = 0;
    (function runCycle(){
        if(cycle>=cycles){ _spotlightActive=false; rows?.classList.remove('spotlight-hide'); return; }
        rows?.classList.add('spotlight-hide');
        setTimeout(()=>{
            rows?.classList.remove('spotlight-hide');
            cycle++;
            setTimeout(runCycle, gapMs);
        }, showMs);
    })();
}

/* Initial load */
try{ currentSettings=JSON.parse(localStorage.getItem('lo_overlay_settings')||'{}'); applySettings(); }catch(_){}
const init = load();
if (init?.teams?.length) { lastTeams = init.teams; lastGoodTs = init.updated || Date.now(); render(lastTeams); }

/* الخلفيات (صور/فيديو) صارت تُخزَّن بـ IndexedDB وليس localStorage (يتحمل ملفات أكبر بكثير)،
   لذا نحمّلها هنا بشكل غير متزامن كي تظهر حتى قبل وصول أول بث مباشر من لوحة التحكم */
(async()=>{
    try{
        if(!currentSettings.bg) currentSettings.bg={};
        const keys=['headerBg','bodyBg','elimBannerBg'];
        for(const k of keys){
            const v=await loIdbGet(k);
            if(v) currentSettings.bg[k]=v;
        }
        applySettings();
    }catch(e){ console.warn('[init] تعذر تحميل الخلفيات من IndexedDB:', e); }
})();
</script>
